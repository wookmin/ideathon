name: tripreceipt
description: "TripReceipt prototype for travel receipt analysis."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  image_picker: ^1.1.0
  camera: ^0.11.1
  google_mlkit_text_recognition: ^0.13.0
  dio: ^5.4.0
  uuid: ^4.3.0
  intl: ^0.19.0
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.0
  google_maps_flutter: ^2.17.0
  geolocator: ^14.0.2
  provider: ^6.1.5+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/design/mockups/
